services:
  # 1. Base de données MySQL
  db:
    image: mysql:8.0
    container_name: edusmart-db
    restart: always
    environment:
      MYSQL_DATABASE: edusmart_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3310:3306" 
    volumes:
      - edusmart_db_data:/var/lib/mysql

  # 2. Backend Laravel
  backend:
    build: 
      context: ./Backend
      dockerfile: Dockerfile
    container_name: edusmart-api
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=edusmart_db
      - DB_USERNAME=root
      - DB_PASSWORD=root
    volumes:
      - ./Backend/cacert.pem:/usr/local/etc/php/cacert.pem:ro
      # IMPORTANT : On partage le dossier des logs de Laravel pour que Logstash puisse y accéder
      - ./Backend/storage/logs:/var/www/html/storage/logs
    command: >
      sh -c "echo 'curl.cainfo=\"/usr/local/etc/php/cacert.pem\"' >> /usr/local/etc/php/conf.d/docker-php-ext-curl.ini && 
             echo 'openssl.cafile=\"/usr/local/etc/php/cacert.pem\"' >> /usr/local/etc/php/conf.d/docker-php-ext-openssl.ini && 
             php artisan serve --host=0.0.0.0 --port=8000"

  # 3. Frontend React (Vite)
  frontend:
    build: 
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: edusmart-ui
    ports:
      - "4200:5173" 
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    depends_on:
      - backend

  # 4. Agent de collecte des métriques Système (CPU & RAM)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: edusmart-node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"

  # 5. Collecteur de Métriques Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: edusmart-prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - node-exporter

  # 6. Visualisation Grafana
  grafana:
    image: grafana/grafana-oss:latest
    container_name: edusmart-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # 7. Base de données de recherche des logs (Elasticsearch)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: edusmart-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  # 8. Outil de traitement et filtrage des logs (Logstash)
  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.10
    container_name: edusmart-logstash
    restart: always
    volumes:
      # On lie le fichier de config logstash qu'on va créer à l'étape suivante
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      # On récupère le dossier des logs partagé par le backend Laravel
      - ./Backend/storage/logs:/var/log/laravel:ro
    depends_on:
      - elasticsearch

  # 9. Interface utilisateur pour les logs (Kibana)
  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.10
    container_name: edusmart-kibana
    restart: always
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

volumes:
  edusmart_db_data:
  grafana_data:
  es_data: